ext{
    javaVersion = 11
    lombokVersion = "1.18.22"
    springVersion = "5.3.14"
    springBootVersion = "2.6.2"
    springCloudVersion = "3.1.0"
    springSecurityVersion = "5.6.0"
    alibabaCloudVersion = "2021.1"
    reactorVersion = "3.4.13"
    jacksonBaseVersion = "2.13.0"
    commonsPooVersion = "2.11.1"
    mysqlVersion = "8.0.27"
    jakartaVersion = "2.0.2"
    jakartaAnnotationVersion = "1.3.5"
    sentryVersion = "5.4.0"
    hutoolVersion = "5.7.17"
    spockVersion = "2.1-M2-groovy-3.0"
    vavrVersion = "0.10.4"
    caffeineVersion = "3.0.5"
    saTokenVersion = "1.28.0"
    validatorVersion = "7.0.1.Final"
    r2dbcMysqlVersion = "0.8.2.RELEASE"
    javaxAnnotation = "1.3.2"
}

configure(subprojects) {
    group = GROUP
    version = VERSION
    apply plugin: 'maven-publish'
    task publishSnapshot(type: GradleBuild) {
        if (VERSION.endsWith('SNAPSHOT')) {
            tasks = ['clean', 'build', 'publish']
        }
    }
}


configure(subprojects - project(":shore-bom")) {
    apply plugin: "java-library"
    apply from: "${rootProject.projectDir}/gradle/publish-jar.gradle"
    sourceCompatibility = "$javaVersion"
    targetCompatibility = "$javaVersion"
    tasks.withType(JavaCompile) {
        options.encoding = "UTF-8"
        options.compilerArgs << "-Xlint:unchecked" << "-Xlint:deprecation"
    }
    repositories {
        mavenLocal()
        maven { url 'https://maven.aliyun.com/repository/public/' }
        mavenCentral()
    }
    dependencies{
        compileOnly("org.projectlombok:lombok:$lombokVersion")
        annotationProcessor("org.projectlombok:lombok:$lombokVersion")
        testAnnotationProcessor("org.projectlombok:lombok:$lombokVersion")
        testCompileOnly("org.projectlombok:lombok:$lombokVersion")
        testImplementation("org.springframework.boot:spring-boot-starter-test:$springBootVersion")
        testImplementation("io.projectreactor:reactor-test:$reactorVersion")
    }
    compileJava.dependsOn(processResources)
}


def getRepositoryUsername() {
    return System.getenv('REPO_USER_NAME') ?: REPO_USER_NAME
}

def getRepositoryPassword() {
    return System.getenv('REPO_PASS_WORD') ?: REPO_PASS_WORD
}
